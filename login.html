<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobify - Acceso</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #6f42c1 0%, #00b4d8 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .tarjeta-login {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }
        h2 { color: #6f42c1; margin-top: 0; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .grupo-input { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; color: #6f42c1; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 15px; 
            outline: none; 
            background: #fafafa;
            color: #333333;
        }
        input:focus, select:focus { border-color: #00b4d8; background: white; }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #6f42c1; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.2s;
        }
        button:hover { background-color: #5a32a3; transform: scale(1.01); }
        .enlace-cambio { 
            margin-top: 20px; 
            font-size: 13px; 
            color: #00b4d8; 
            cursor: pointer; 
            display: inline-block; 
            text-decoration: underline; 
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="tarjeta-login">
        <h2 id="titulo-pantalla">Iniciar Sesión</h2>
        <p id="descripcion-pantalla">Ponele tus datos para entrar a Tobify.</p>
        
        <div id="form-login">
            <div class="grupo-input">
                <label>Nombre de Usuario / Alias</label>
                <input type="text" id="login-usuario" placeholder="Ej: ElCheleNica">
            </div>
            <div class="grupo-input">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="******">
            </div>
        </div>

        <div id="form-registro" style="display: none;">
            <div class="grupo-input">
                <label>Nombre de Usuario Único</label>
                <input type="text" id="reg-usuario" placeholder="Ej: Juancho99">
            </div>
            <div class="grupo-input">
                <label>Nombre Completo</label>
                <input type="text" id="reg-nombre" placeholder="Ej: Juan José Rivas">
            </div>
            <div class="grupo-input">
                <label>Fecha de Nacimiento</label>
                <input type="text" id="reg-nacimiento" placeholder="Ej: 24/08/2002">
            </div>
            <div class="grupo-input">
                <label>Sexo / Género</label>
                <select id="reg-sexo">
                    <option value="" disabled selected>Seleccioná tu sexo</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>
            <div class="grupo-input">
                <label>Contraseña Nueva</label>
                <input type="password" id="reg-pass" placeholder="******">
            </div>
            <div class="grupo-input">
                <label>Repetir Contraseña</label>
                <input type="password" id="reg-pass-confirm" placeholder="******">
            </div>
        </div>

        <button id="btn-principal" onclick="procesarFormulario()">Entrar a Tobify</button>

        <span class="enlace-cambio" id="btn-cambiar" onclick="intercambiarModo()">¿No tenés cuenta? Registrate aquí</span>
    </div>

    <script>
        // 🔥 ¡CONECTADO AL CIEN CON TUS CODES REALES!
        const firebaseConfig = {
            apiKey: "AIzaSyA5t3sMtfl1ngjG93Gjd7t-Bnncv1NDJ0g",
            authDomain: "tobify-26b47.firebaseapp.com",
            projectId: "tobify-26b47",
            storageBucket: "tobify-26b47.firebasestorage.app",
            messagingSenderId: "880734962681",
            appId: "1:880734962681:web:103cf6d5c3afbeea5e3328",
            measurementId: "G-HGLLXFR9CF"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let modoRegistro = false;

        function intercambiarModo() {
            modoRegistro = !modoRegistro;
            let titulo = document.getElementById('titulo-pantalla');
            let desc = document.getElementById('descripcion-pantalla');
            let btn = document.getElementById('btn-principal');
            let link = document.getElementById('btn-cambiar');
            let divLogin = document.getElementById('form-login');
            let divRegistro = document.getElementById('form-registro');

            if(modoRegistro) {
                titulo.innerText = "Crear Cuenta";
                desc.innerText = "Formá parte de la red social más pinolera.";
                btn.innerText = "Registrarme y Crear Cuenta";
                link.innerText = "¿Ya tenés cuenta? Inicia sesión";
                divLogin.style.display = 'none';
                divRegistro.style.display = 'block';
            } else {
                titulo.innerText = "Iniciar Sesión";
                desc.innerText = "Ponele tus datos para entrar a Tobify.";
                btn.innerText = "Entrar a Tobify";
                link.innerText = "¿No tenés cuenta? Registrate aquí";
                divLogin.style.display = 'block';
                divRegistro.style.display = 'none';
            }
        }

        function procesarFormulario() {
            if (modoRegistro) {
                let usuario = document.getElementById('reg-usuario').value.trim().toLowerCase();
                let nombreCompleto = document.getElementById('reg-nombre').value.trim();
                let nacimiento = document.getElementById('reg-nacimiento').value.trim();
                let sexo = document.getElementById('reg-sexo').value;
                let pass = document.getElementById('reg-pass').value;
                let passConfirm = document.getElementById('reg-pass-confirm').value;

                if(!usuario || !nombreCompleto || !nacimiento || !sexo || !pass || !passConfirm) {
                    alert("No dejes ningún campo vacío para registrarte, hombe.");
                    return;
                }

                if(pass !== passConfirm) {
                    alert("❌ Las contraseñas no coinciden. Verificalas bien.");
                    return;
                }

                // Guardar usuario en tu Firestore real
                db.collection("usuarios").doc(usuario).get().then((doc) => {
                    if (doc.exists) {
                        alert("❌ Ese nombre de usuario ya está ocupado. Buscate otro.");
                    } else {
                        db.collection("usuarios").doc(usuario).set({
                            usuario: usuario,
                            nombreCompleto: nombreCompleto,
                            fechaNacimiento: nacimiento,
                            sexo: sexo,
                            password: pass,
                            fechaCreacion: firebase.firestore.FieldValue.serverTimestamp()
                        })
                        .then(() => {
                            localStorage.setItem('sesion_activa', 'true');
                            localStorage.setItem('usuario_nombre', nombreCompleto);
                            localStorage.setItem('usuario_alias', "@" + usuario);
                            alert("¡Bárbaro! Registrado al cien en la nube.");
                            window.location.href = "principal.html";
                        })
                        .catch((error) => {
                            alert("Error al guardar en Firebase: " + error.message);
                        });
                    }
                }).catch((error) => {
                    alert("Error en base de datos: " + error.message);
                });

            } else {
                let usuarioLogin = document.getElementById('login-usuario').value.trim().toLowerCase();
                let passLogin = document.getElementById('login-pass').value;

                if(!usuarioLogin || !passLogin) {
                    alert("Meté tu usuario y contraseña para ingresar.");
                    return;
                }

                // Iniciar sesión buscando en tu Firestore real
                db.collection("usuarios").doc(usuarioLogin).get().then((doc) => {
                    if (doc.exists) {
                        let datos = doc.data();
                        if(passLogin === datos.password) {
                            localStorage.setItem('sesion_activa', 'true');
                            localStorage.setItem('usuario_nombre', datos.nombreCompleto);
                            localStorage.setItem('usuario_alias', "@" + datos.usuario);
                            window.location.href = "principal.html";
                        } else {
                            alert("❌ Contraseña incorrecta.");
                        }
                    } else {
                        alert("❌ Este usuario no existe. Registrate abajo.");
                    }
                }).catch((error) => {
                    alert("Error de conexión: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
