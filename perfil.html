<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tobify - Mi Perfil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Barra de Navegación */
    .navbar {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-tobify {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px #00f2fe;
      text-decoration: none;
    }

    .btn-nav {
      background: #00f2fe;
      color: #333;
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn-nav:hover {
      background: #fff;
      box-shadow: 0 0 15px #00f2fe;
    }

    /* Contenedor del Perfil */
    .perfil-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      width: 90%;
      max-width: 500px;
      margin: 30px 0;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* Foto de Perfil */
    .avatar-wrapper {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 20px;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #00f2fe;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
      background-color: rgba(255, 255, 255, 0.3);
    }

    .username-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #fff;
    }

    .user-status {
      font-size: 14px;
      color: #dfdfdf;
      font-style: italic;
      margin-bottom: 25px;
    }

    /* Info del perfil */
    .info-box {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      text-align: left;
    }

    .info-item {
      margin-bottom: 10px;
      font-size: 15px;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: #00f2fe;
      font-weight: bold;
    }

    /* Botón Configuración */
    .btn-edit {
      background: linear-gradient(90deg, #b04efd, #4e54c8);
      color: white;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      display: inline-block;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(176, 78, 253, 0.4);
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(176, 78, 253, 0.6);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="principal.html" class="logo-tobify">Tobify</a>
    <a href="principal.html" class="btn-nav">Volver al Muro</a>
  </nav>

  <main class="perfil-container">
    <div id="profile-content">
      <div class="avatar-wrapper">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de Perfil" class="avatar-img" id="user-avatar">
      </div>

      <h2 class="username-title" id="user-name">Cargando...</h2>
      <p class="user-status" id="user-bio">"¡Disfrutando de Tobify al suave!"</p>

      <div class="info-box">
        <div class="info-item">
          <span class="info-label">Identificador:</span> <span id="info-id">---</span>
        </div>
        <div class="info-item">
          <span class="info-label">Estado:</span> <span id="db-status" style="color: #00f2fe;">● Cargando Datos Locales...</span>
        </div>
      </div>

      <a href="editar-perfil-config.html" class="btn-edit">Editar Perfil e Imagen</a>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // Configuración real de tu proyecto Tobify
    const firebaseConfig = {
      apiKey: "AIzaSyA5t3sMtfl1ngjG93Gjd7t-Bnncv1NDJ0g",
      authDomain: "tobify-26b47.firebaseapp.com",
      projectId: "tobify-26b47",
      storageBucket: "tobify-26b47.firebasestorage.app",
      messagingSenderId: "880734962681",
      appId: "1:880734962681:web:103cf6d5c3afbeea5e3328",
      measurementId: "G-HGLLXFR9CF"
    };

    // 1. EXTRAER INMEDIATAMENTE DATOS DE LOCALSTORAGE (Cero retrasos)
    const usuarioLogueadoId = localStorage.getItem("usuarioLogueado") || "ID_INVITADO";
    const nombreLocalBackup = localStorage.getItem("nombreUsuarioLogueado") || "Usuario Tobify";

    // Pintar los datos en la pantalla de una vez sin esperar a nadie
    document.getElementById("user-name").innerText = nombreLocalBackup;
    document.getElementById("info-id").innerText = "@" + nombreLocalBackup.toLowerCase().replace(/\s+/g, '');

    // 2. CORREGIR EL ERROR "FIREBASE IS NOT DEFINED" CON UNA VERIFICACIÓN SEGURA
    // Si las librerías de arriba fallan por red o bloqueo, este 'if' evita que el código muera.
    if (typeof firebase !== 'undefined') {
      try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Intentar traer datos frescos de la nube en segundo plano
        db.collection("usuarios").doc(usuarioLogueadoId).get().then((docSnap) => {
          if (docSnap.exists) {
            const datos = docSnap.data();
            if (datos.nombre) {
              document.getElementById("user-name").innerText = datos.nombre;
              document.getElementById("info-id").innerText = "@" + datos.nombre.toLowerCase().replace(/\s+/g, '');
            }
            if (datos.biografia) {
              document.getElementById("user-bio").innerText = `"${datos.biografia}"`;
            }
            if (datos.fotoPerfilURL) {
              document.getElementById("user-avatar").src = datos.fotoPerfilURL;
            }
            document.getElementById("db-status").innerText = "● Conectado Sincronizado";
            document.getElementById("db-status").style.color = "#4efd54";
          } else {
            document.getElementById("db-status").innerText = "● Modo Local (Sin datos en la nube)";
            document.getElementById("db-status").style.color = "#ffbd03";
          }
        }).catch((error) => {
          console.log("Error de permisos en Firestore, trabajando local:", error);
          document.getElementById("db-status").innerText = "● Modo Local Permanente";
          document.getElementById("db-status").style.color = "#00f2fe";
        });
      } catch (e) {
        console.error("Error inicializando Firestore:", e);
        EstablecerModoLocalFijo();
      }
    } else {
      // Si Firebase falló rotundamente por red, ejecutamos esto para que la app no colapse
      console.warn("Firebase no pudo ser cargado desde el CDN. Activando respaldo Local.");
      EstablecerModoLocalFijo();
    }

    function EstablecerModoLocalFijo() {
      document.getElementById("db-status").innerText = "● Desconectado (Modo Local Seguro)";
      document.getElementById("db-status").style.color = "#ff4e4e";
    }
  </script>
</body>
</html>
