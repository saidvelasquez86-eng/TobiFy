<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tobify - Mi Perfil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4e54c8, #8f94fb);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Barra de Navegación */
    .navbar {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-tobify {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px #00f2fe;
      text-decoration: none;
    }

    .btn-nav {
      background: #00f2fe;
      color: #333;
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn-nav:hover {
      background: #fff;
      box-shadow: 0 0 15px #00f2fe;
    }

    /* Contenedor del Perfil */
    .perfil-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      width: 90%;
      max-width: 500px;
      margin: 30px 0;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    /* Foto de Perfil */
    .avatar-wrapper {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 20px;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #00f2fe;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
      background-color: rgba(255, 255, 255, 0.3);
    }

    .username-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #fff;
    }

    .user-status {
      font-size: 14px;
      color: #dfdfdf;
      font-style: italic;
      margin-bottom: 25px;
    }

    /* Info del perfil */
    .info-box {
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      text-align: left;
    }

    .info-item {
      margin-bottom: 10px;
      font-size: 15px;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: #00f2fe;
      font-weight: bold;
    }

    /* Botón Configuración */
    .btn-edit {
      background: linear-gradient(90deg, #b04efd, #4e54c8);
      color: white;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      display: inline-block;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(176, 78, 253, 0.4);
    }

    .btn-edit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(176, 78, 253, 0.6);
    }

    /* Cargando */
    .loading-text {
      font-size: 18px;
      color: #00f2fe;
      font-weight: bold;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="principal.html" class="logo-tobify">Tobify</a>
    <a href="principal.html" class="btn-nav">Volver al Muro</a>
  </nav>

  <main class="perfil-container" id="profile-card">
    <div id="loading-state">
      <p class="loading-text">Cargando datos de Tobify...</p>
    </div>

    <div id="profile-content" style="display: none;">
      <div class="avatar-wrapper">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de Perfil" class="avatar-img" id="user-avatar">
      </div>

      <h2 class="username-title" id="user-name">Nombre de Usuario</h2>
      <p class="user-status" id="user-bio">"¡Disfrutando de Tobify al suave!"</p>

      <div class="info-box">
        <div class="info-item">
          <span class="info-label">ID de Cuenta:</span> <span id="info-id">---</span>
        </div>
        <div class="info-item">
          <span class="info-label">Estado de conexión:</span> <span style="color: #4efd54;">● Activo en la nube</span>
        </div>
      </div>

      <a href="editar-perfil-config.html" class="btn-edit">Editar Perfil e Imagen</a>
    </div>
  </main>

  <script>
    // ⚠️ REEMPLAZÁ ESTE BLOQUE EXACTO CON LAS CREDENCIALES REALES DE TU PROYECTO
    // (Las mismas que copiaste en tu archivo login.html)
    const firebaseConfig = {
      apiKey: "TU_API_KEY_AQUÍ",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO_ID",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Verificar quién inició sesión usando la memoria local segura
    // Cuando el usuario ingresa en login.html, guardamos su identificador de cuenta
    const usuarioLogueadoId = localStorage.getItem("usuarioLogueado");

    // Seguridad: Si algún vivo intenta entrar escribiendo perfil.html en la barra sin loguearse,
    // lo mandamos de regreso al login.html inmediatamente.
    if (!usuarioLogueadoId) {
      window.location.href = "login.html";
    } else {
      // Ejecutar la lectura en la base de datos de Google Cloud Firestore
      obtenerDatosUsuario();
    }

    function obtenerDatosUsuario() {
      // Buscamos en la colección "usuarios" el documento que corresponde a este ID
      db.collection("usuarios").doc(usuarioLogueadoId).get()
        .then((doc) => {
          if (doc.exists) {
            const datos = doc.data();

            // Insertar de manera dinámica el nombre real del usuario en el HTML
            document.getElementById("user-name").innerText = datos.nombre || usuarioLogueadoId;
            document.getElementById("info-id").innerText = "@" + usuarioLogueadoId;

            // Si el usuario ya guardó una biografía o estado en su perfil
            if (datos.biografia) {
              document.getElementById("user-bio").innerText = `"${datos.biografia}"`;
            }

            // Si el usuario ya tiene guardado un enlace de foto de perfil real
            if (datos.fotoPerfilURL) {
              document.getElementById("user-avatar").src = datos.fotoPerfilURL;
            }

            // Ocultar el aviso de cargando y mostrar la tarjeta con los datos al cien
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("profile-content").style.display = "block";

          } else {
            // Si el documento no existe en Firestore pero está logueado localmente
            console.log("No se encontraron detalles del perfil en la base de datos.");
            document.getElementById("user-name").innerText = usuarioLogueadoId;
            document.getElementById("info-id").innerText = "@" + usuarioLogueadoId;
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("profile-content").style.display = "block";
          }
        })
        .catch((error) => {
          console.error("Error al jalar los datos de Firebase: ", error);
          alert("Hubo un clavo al conectar con el servidor de Tobify.");
        });
    }
  </script>
</body>
</html>
