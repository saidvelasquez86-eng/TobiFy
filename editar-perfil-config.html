<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobify - Editar Perfil</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6f42c1 0%, #00d2ff 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .contenedor-editar {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.15);
            max-width: 360px;
            width: 100%;
        }
        h2 {
            color: #6f42c1;
            margin-top: 0;
            text-align: center;
            font-size: 24px;
        }
        .grupo-input {
            margin-bottom: 20px;
            text-align: center;
        }
        .grupo-input-texto {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            font-size: 12px;
            color: #6f42c1;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .vista-previa {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6f42c1;
            margin-bottom: 10px;
            display: inline-block;
        }
        .btn-buscar-foto {
            background-color: #f0f4f8;
            color: #6f42c1;
            padding: 8px 14px;
            border-radius: 6px;
            display: inline-block;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-buscar-foto:hover {
            background-color: #e2e8f0;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #00b4d8;
        }
        textarea {
            resize: none;
            height: 70px;
            font-family: inherit;
        }
        .botones {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-guardar {
            background-color: #6f42c1;
            color: white;
            box-shadow: 0 4px 6px rgba(111, 66, 193, 0.2);
        }
        .btn-guardar:hover {
            background-color: #5a32a3;
        }
        .btn-cancelar {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-cancelar:hover {
            background-color: #d2d2d2;
        }
    </style>
</head>
<body>

    <div class="contenedor-editar">
        <h2>Editar Perfil</h2>
        
        <div class="grupo-input">
            <label>FOTO DE PERFIL</label>
            <img id="vista-previa" class="vista-previa" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Vista previa">
            <br>
            <label for="input-avatar" class="btn-buscar-foto">📸 Cambiar Foto</label>
            <input type="file" id="input-avatar" accept="image/*" style="display: none;">
        </div>
        
        <div class="grupo-input-texto">
            <label>TU NOMBRE COMPLETO</label>
            <input type="text" id="nuevo-nombre" placeholder="Cargando nombre...">
        </div>

        <div class="grupo-input-texto">
            <label>BIOGRAFÍA / ESTADO</label>
            <textarea id="nueva-bio" placeholder="¿Qué onda de tu vida, hombe? Cuentate algo..."></textarea>
        </div>

        <div class="botones">
            <button class="btn-cancelar" id="btn-cancelar-click">Cancelar</button>
            <button class="btn-guardar" id="btn-guardar-click">Guardar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configuración de tu Firebase Tobify
        const firebaseConfig = {
            apiKey: "AIzaSyA5t3sMtfl1ngjG93Gjd7t-Bnncv1NDJ0g",
            authDomain: "tobify-26b47.firebaseapp.com",
            projectId: "tobify-26b47",
            storageBucket: "tobify-26b47.firebasestorage.app",
            messagingSenderId: "880734962681",
            appId: "1:880734962681:web:103cf6d5c3afbeea5e3328",
            measurementId: "G-HGLLXFR9CF"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. VERIFICACIÓN DE SEGURIDAD (LocalStorage)
        const miAliasLocal = localStorage.getItem("usuario_alias");
        const sesionActiva = localStorage.getItem("sesion_activa");

        if (!miAliasLocal || sesionActiva !== "true") {
            alert("¡Epa, mi broder! No tenés una sesión activa. Iniciá sesión primero.");
            window.location.href = "index.html"; // O login.html dependiendo de tu archivo principal
        }

        // Limpiamos el alias para usarlo de ID exacto en Firestore (ej: "@juancho" -> "juancho")
        const miUsuarioID = miAliasLocal.replace("@", "").trim().toLowerCase();

        // 2. CARGAR DATOS ACTUALES DESDE FIRESTORE
        const userDocRef = doc(db, "usuarios", miUsuarioID);
        
        getDoc(userDocRef).then((docSnap) => {
            if (docSnap.exists()) {
                const datos = docSnap.data();
                
                // Sincronizar inputs con los campos de la base de datos
                document.getElementById('nuevo-nombre').value = datos.nombreCompleto || "";
                document.getElementById('nueva-bio').value = datos.biografia || "";
                
                if (datos.fotoPerfilURL) {
                    document.getElementById('vista-previa').src = datos.fotoPerfilURL;
                }
            } else {
                console.error("No se encontró el documento de usuario en la base de datos.");
            }
        }).catch((error) => {
            console.error("Clavo al cargar datos de perfil de la nube:", error);
        });

        // Evento para activar la vista previa local al elegir una foto
        document.getElementById('input-avatar').addEventListener('change', (event) => {
            let vistaPrevia = document.getElementById('vista-previa');
            if(event.target.files[0]) {
                vistaPrevia.src = URL.createObjectURL(event.target.files[0]);
            }
        });

        // 3. ASIGNAR COMPORTAMIENTOS A LOS BOTONES
        document.getElementById('btn-guardar-click').addEventListener('click', guardarPerfil);
        document.getElementById('btn-cancelar-click').addEventListener('click', () => {
            window.location.href = "perfil.html";
        });

        // 4. LÓGICA DE ACTUALIZACIÓN EN FIRESTORE
        function guardarPerfil() {
            const nuevoNombre = document.getElementById('nuevo-nombre').value.trim();
            const nuevaBio = document.getElementById('nueva-bio').value.trim();

            if (!nuevoNombre) {
                alert("Ponele un nombre al menos, hombe, no vas a quedar anónimo.");
                return;
            }

            // Actualizamos en la nube de Firebase usando updateDoc
            updateDoc(userDocRef, {
                nombreCompleto: nuevoNombre,
                biografia: nuevaBio
                // Nota: Aquí se actualizará 'fotoPerfilURL' cuando configuremos ImgBB para subir archivos
            })
            .then(() => {
                // Actualizar también en LocalStorage para que el Muro se actualice rápido sin parpadeos
                localStorage.setItem("usuario_nombre", nuevoNombre);
                
                alert("¡Bárbaro! Tu perfil se actualizó en la nube.");
                window.location.href = "perfil.html";
            })
            .catch((error) => {
                alert("Clavo al guardar cambios en Firestore: " + error.message);
            });
        }
    </script>

</body>
</html>
